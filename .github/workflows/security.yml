name: Security and CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=moderate

      - name: Verify workspace
        run: npm run verify

      - name: Check whitespace
        run: git diff --check

      - name: Dry-run API Worker deploy
        run: npx wrangler deploy --dry-run --config wrangler.api.toml --outdir security-review/wrangler-dry-run-ci
